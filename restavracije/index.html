<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Restavracije & Kavarne</title>
  <link rel="stylesheet" href="../assets/directory.css?v=20260306-1">
  <link rel="stylesheet" href="../assets/theme-soca.css">
</head>
<body class="theme-soca">
  <header class="dir-header">
    <button id="dir-back" class="dir-back" type="button" aria-label="Nazaj">←</button>
    <div class="dir-title-text" id="dir-title">Restavracije & Kavarne</div>
  </header>

  <div class="dir-chips-wrap">
    <div id="dir-chips"></div>
  </div>

  <main class="dir-body">
    <div id="dir-loading">⏳</div>
    <div id="dir-empty"></div>

    <!-- Premium section -->
    <section style="display:contents">
      <div id="dir-hdr-premium" class="dir-sec-hdr"></div>
      <div class="dir-premium-wrap" id="dir-sec-premium"></div>
    </section>

    <!-- Featured section -->
    <section style="display:contents">
      <div id="dir-hdr-featured" class="dir-sec-hdr"></div>
      <div class="dir-featured-scroll" id="dir-sec-featured"></div>
    </section>

    <!-- Standard section -->
    <section style="display:contents">
      <div id="dir-hdr-standard" class="dir-sec-hdr"></div>
      <div class="dir-standard-wrap" id="dir-sec-standard"></div>
    </section>
  </main>

  <script src="../assets/supabase-client.js?v=20260228-2"></script>
  <script>
    window._DIR_TYPE = 'food';
    window._DIR_TIER_LABELS = {
      premium:  { sl:'⭐ Priporočamo',  en:'⭐ Recommended',   de:'⭐ Empfohlen',    it:'⭐ Consigliato',  pl:'⭐ Polecane',      cs:'⭐ Doporučujeme' },
      featured: { sl:'🔥 Popularno',    en:'🔥 Popular',       de:'🔥 Beliebt',      it:'🔥 Popolare',     pl:'🔥 Popularne',     cs:'🔥 Oblíbené' },
      standard: { sl:'📍 Vsi lokali',   en:'📍 All places',    de:'📍 Alle Lokale',  it:'📍 Tutti i locali',pl:'📍 Wszystkie',    cs:'📍 Všechna místa' }
    };
    try { if (window.parent && window.parent._appMunicipality) window._appMunicipality = window.parent._appMunicipality; } catch(e){}
  </script>
  <script src="../assets/directory.js?v=20260306-1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var lang = (localStorage.getItem('preferredLanguage') || 'sl').toLowerCase();
      var tl = window._DIR_TIER_LABELS;
      ['premium','featured','standard'].forEach(function(tier) {
        var el = document.getElementById('dir-hdr-' + tier);
        if (el && tl[tier]) el.textContent = tl[tier][lang] || tl[tier].en;
      });
      var emptyEl = document.getElementById('dir-empty');
      var ui = { sl:'Ni rezultatov.', en:'No results.', de:'Keine Ergebnisse.', it:'Nessun risultato.', pl:'Brak wyników.', cs:'Žádné výsledky.' };
      if (emptyEl) emptyEl.textContent = ui[lang] || ui.en;
    });
  </script>
  <div id="footer-legal"></div>
  <script>
  (function(){
    var el=document.getElementById('footer-legal');if(!el)return;
    var lang=(localStorage.getItem('preferredLanguage')||'sl').toLowerCase().split('-')[0];
    if(lang!=='sl'&&lang!=='en')lang='sl';
    var COPYRIGHT='© 2026 Soča Guide';
    var DOCS=['impressum','privacy','cookies','terms'];
    el.innerHTML='<span class="footer-copy">'+COPYRIGHT+'</span>';
    var _w=0;function tryLoad(){
      var sb=window.supabaseClient||window.SB;
      if(!sb){_w+=200;if(_w<8000)setTimeout(tryLoad,200);return;}
      sb.from('items').select('item_key,data_json')
        .eq('section_key','ui').is('tenant_id',null)
        .in('item_key',['legal_impressum','legal_privacy','legal_cookies','legal_terms'])
        .then(function(r){
          if(!r||!r.data)return;
          var h='<span class="footer-copy">'+COPYRIGHT+'</span>';
          DOCS.forEach(function(doc){
            var dj=null;
            for(var i=0;i<r.data.length;i++){if(r.data[i].item_key==='legal_'+doc){dj=r.data[i].data_json;break;}}
            if(!dj||dj.enabled_in_footer===false)return;
            var title=dj.title&&(dj.title[lang]||dj.title.sl);
            if(!title)return;
            h+='<a href="/legal/index.html?doc='+doc+'" class="footer-link">'+title+'</a>';
          });
          el.innerHTML=h;
        }).catch(function(){});
    }tryLoad();
  })();
  </script>
</body>
</html>
