<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Hišni red – Dolina Soče</title>
  <link rel="stylesheet" href="../assets/app.css?v=20260219-1">
  <style>
    .rules-page { min-height: 100vh; background: linear-gradient(135deg, #0a1612 0%, #0f1e18 100%); color: #f0fdf4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .rules-header { position: sticky; top: 0; z-index: 10; background: rgba(16, 32, 32, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(34, 211, 238, 0.22); padding: 1rem; padding-top: calc(1rem + env(safe-area-inset-top)); display: flex; align-items: center; gap: 1rem; }
    .rules-back { background: transparent; border: none; color: #f0fdf4; font-size: 1.25rem; cursor: pointer; padding: 0.5rem; line-height: 1; }
    .rules-title { font-size: 1.25rem; font-weight: 700; flex: 1; }
    .rules-body { max-width: 480px; margin: 0 auto; padding: 1rem; padding-bottom: calc(2rem + env(safe-area-inset-bottom)); }
    .rule-item { display: flex; gap: 1rem; margin-bottom: 1.25rem; align-items: flex-start; }
    .rule-icon { font-size: 1.25rem; flex-shrink: 0; }
    .rule-text { margin: 0; line-height: 1.5; }
  </style>
</head>
<body class="rules-page">
  <header class="rules-header">
    <a href="../index.html" id="rulesBack" class="rules-back">← Nazaj</a>
    <div class="rules-title">Hišni red</div>
  </header>
  <main class="rules-body">
    <div class="rule-item"><span class="rule-icon">🔇</span><p class="rule-text" data-i18n="rule1"></p></div>
    <div class="rule-item"><span class="rule-icon">🚭</span><p class="rule-text" data-i18n="rule2"></p></div>
    <div class="rule-item"><span class="rule-icon">🗑️</span><p class="rule-text" data-i18n="rule3"></p></div>
    <div class="rule-item"><span class="rule-icon">🔐</span><p class="rule-text" data-i18n="rule4"></p></div>
    <div class="rule-item"><span class="rule-icon">🚪</span><p class="rule-text" data-i18n="rule5"></p></div>
  </main>

  <!-- i18n translations -->
  <script src="../assets/i18n.js?v=20260219-1"></script>
  <script src="../assets/supabase-client.js?v=20260219-1"></script>
  <!-- tenant-loader.js not needed here — we call the RPC directly below -->
  <script>
  (function () {
    'use strict';

    // ── Language detection ───────────────────────────────────────────────
    var SUPPORTED = ['sl','en','de','it','pl','cs'];
    function detectLang() {
      var raw = (localStorage.getItem('preferredLanguage') || localStorage.getItem('lang') || '').toLowerCase().trim();
      if (SUPPORTED.indexOf(raw) >= 0) return raw;
      raw = (new URLSearchParams(window.location.search).get('lang') || '').toLowerCase().trim();
      if (SUPPORTED.indexOf(raw) >= 0) return raw;
      return 'sl';
    }
    var lang = detectLang();
    var tr = (window.APP && window.APP.translations && window.APP.translations[lang]) || {};

    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (tr[key]) el.textContent = tr[key];
    });

    var titleEl = document.querySelector('.rules-title');
    if (titleEl && tr.rules) titleEl.textContent = tr.rules;
    if (tr.rules) document.title = tr.rules + ' \u2013 Dolina So\u010de';

    var backEl = document.getElementById('rulesBack');
    if (backEl && tr.back_btn) backEl.textContent = '\u2190 ' + tr.back_btn;
    document.documentElement.lang = lang;

    // ── Slug → back-link ─────────────────────────────────────────────────
    var slug = new URLSearchParams(window.location.search).get('t') || null;
    if (slug && backEl) backEl.href = '../index.html?t=' + encodeURIComponent(slug);

    // ── Tenant private rules via RPC ─────────────────────────────────────
    if (!slug) return;

    var container = document.querySelector('main.rules-body');
    if (!container) return;

    function applyPrivateText(text) {
      var clean = (text || '').trim();
      if (!clean) return;
      // Remove all hardcoded rule-item elements
      container.querySelectorAll('.rule-item').forEach(function (n) { n.remove(); });
      // Remove any previously injected block (idempotent)
      var prev = document.getElementById('private-rules-block');
      if (prev) prev.remove();
      // One clean <p> — no title, no border, no bullets, no splitting
      var p = document.createElement('p');
      p.id = 'private-rules-block';
      p.style.cssText =
        'font-size:0.95rem;line-height:1.6;white-space:pre-line;' +
        'color:#f0fdf4;padding:0;margin:0;';
      p.textContent = clean;
      container.appendChild(p);
    }

    function runRpc(sb) {
      sb.rpc('get_guest_items_by_slug', { p_slug: slug })
        .then(function (res) {
          if (res.error || !res.data) return;
          var row = res.data.find(function (r) {
            return r.section_key === 'house_rules' && r.item_key === 'house_rules_private';
          });
          if (!row || !row.data_json) return;
          var dj = row.data_json;
          var text = (typeof dj.text === 'string' ? dj.text : '')
                  || (Array.isArray(dj.rules) ? dj.rules.join('\n') : '')
                  || (typeof dj === 'string' ? dj : '');
          applyPrivateText(text);
        })
        .catch(function () {});
    }

    var _elapsed = 0;
    function poll() {
      if (window.supabaseClient && typeof window.supabaseClient.rpc === 'function') {
        runRpc(window.supabaseClient); return;
      }
      _elapsed += 100;
      if (_elapsed < 8000) setTimeout(poll, 100);
    }
    poll();
  })();
  </script>
  <div id="footer-legal" style="color:#a0b0a8"></div>
  <script>
  (function(){
    var el=document.getElementById('footer-legal');if(!el)return;
    var lang=(localStorage.getItem('preferredLanguage')||'sl').toLowerCase().split('-')[0];
    if(lang!=='sl'&&lang!=='en')lang='sl';
    var COPYRIGHT='© 2026 Soča Guide';
    var DOCS=['impressum','privacy','cookies','terms'];
    el.innerHTML='<span>'+COPYRIGHT+'</span>';
    var _w=0;function tryLoad(){
      var sb=window.supabaseClient||window.SB;
      if(!sb){_w+=200;if(_w<8000)setTimeout(tryLoad,200);return;}
      sb.from('items').select('item_key,data_json')
        .eq('section_key','ui').is('tenant_id',null)
        .in('item_key',['legal_impressum','legal_privacy','legal_cookies','legal_terms'])
        .then(function(r){
          if(!r||!r.data)return;
          var h='<span>'+COPYRIGHT+'</span>';
          DOCS.forEach(function(doc){
            var dj=null;
            for(var i=0;i<r.data.length;i++){if(r.data[i].item_key==='legal_'+doc){dj=r.data[i].data_json;break;}}
            if(!dj||dj.enabled_in_footer===false)return;
            var title=dj.title&&(dj.title[lang]||dj.title.sl);
            if(!title)return;
            h+='<a href="/legal/index.html?doc='+doc+'" style="color:inherit;text-decoration:none;opacity:0.7">'+title+'</a>';
          });
          el.innerHTML=h;
        }).catch(function(){});
    }tryLoad();
  })();
  </script>
</body>
</html>
