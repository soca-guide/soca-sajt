<!doctype html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soča Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/supabase-client.js?v=20260228-2"></script>
</head>
<body class="min-h-screen bg-[#0b0f14] text-gray-100">

  <div class="sticky top-0 z-50 border-b border-white/10 bg-black/30 backdrop-blur">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <button id="backBtn" class="px-3 py-2 rounded-xl border border-white/15 bg-white/5"></button>
      <div class="text-center">
        <div class="font-semibold text-center" id="pageTitle">Soča Live</div>
        <div id="updated" class="text-xs text-gray-400 text-center"></div>
      </div>
      <div id="live-badge" class="text-xs px-2 py-1 rounded-full border border-emerald-500/20 bg-emerald-500/10 text-emerald-300">LIVE</div>
    </div>

  </div>

  <main class="max-w-4xl mx-auto px-4 py-5 space-y-4">
    <section id="stations"></section>
  </main>

<script>
  var SUPPORTED_LANGS = ['sl','en','de','pl','cs','it'];
  function getSelectedLang(){
    var raw = (localStorage.getItem('preferredLanguage') || localStorage.getItem('lang') || 'en').toLowerCase();
    return SUPPORTED_LANGS.indexOf(raw) >= 0 ? raw : 'en';
  }
  var labelsByLang = {
    sl: { back: '← Nazaj', title: 'Soča Live', updated: 'Osveženo', all: 'Vse', municipal: '🏛️ Občine', municipalHeading: '🏛️ Obvestila občin', level: 'vodostaj', flow: 'protok', temp: 'temp.', details: 'Detalji (zadnja merenja)', trend_up: 'up', trend_down: 'down', trend_stable: 'stabilno', demo_arso: 'DEMO (kasnije ARSO)' },
    en: { back: '← Back', title: 'Soča Live', updated: 'Updated', all: 'All', municipal: '🏛️ Municipal', municipalHeading: '🏛️ Municipal notices', level: 'level', flow: 'flow', temp: 'temp.', details: 'Details (last measurements)', trend_up: 'up', trend_down: 'down', trend_stable: 'stable', demo_arso: 'DEMO (ARSO later)' },
    de: { back: '← Zurück', title: 'Soča Live', updated: 'Aktualisiert', all: 'Alle', municipal: '🏛️ Gemeinden', municipalHeading: '🏛️ Gemeindenachrichten', level: 'Pegel', flow: 'Abfluss', temp: 'Temp.', details: 'Details (letzte Messungen)', trend_up: 'auf', trend_down: 'ab', trend_stable: 'stabil', demo_arso: 'DEMO (später ARSO)' },
    pl: { back: '← Wstecz', title: 'Soča Live', updated: 'Zaktualizowano', all: 'Wszystkie', municipal: '🏛️ Gminy', municipalHeading: '🏛️ Komunikaty gmin', level: 'poziom', flow: 'przepływ', temp: 'temp.', details: 'Szczegóły (ostatnie pomiary)', trend_up: 'w górę', trend_down: 'w dół', trend_stable: 'stabilny', demo_arso: 'DEMO (ARSO później)' },
    cs: { back: '← Zpět', title: 'Soča Live', updated: 'Aktualizováno', all: 'Vše', municipal: '🏛️ Obce', municipalHeading: '🏛️ Oznámení obcí', level: 'stav', flow: 'průtok', temp: 'tepl.', details: 'Detail (poslední měření)', trend_up: 'nahoru', trend_down: 'dolů', trend_stable: 'stabilní', demo_arso: 'DEMO (později ARSO)' },
    it: { back: '← Indietro', title: 'Soča Live', updated: 'Aggiornato', all: 'Tutti', municipal: '🏛️ Comuni', municipalHeading: '🏛️ Avvisi comunali', level: 'livello', flow: 'portata', temp: 'temp.', details: 'Dettagli (ultime misure)', trend_up: 'su', trend_down: 'giù', trend_stable: 'stabile', demo_arso: 'DEMO (ARSO più tardi)' }
  };
  function applyLang(){
    var lang = getSelectedLang();
    var t = labelsByLang[lang] || labelsByLang.en;
    var backBtn = document.getElementById('backBtn');
    if(backBtn) backBtn.textContent = t.back;
    var titleEl = document.getElementById('pageTitle');
    if(titleEl) titleEl.textContent = t.title;
    var updatedEl = document.getElementById('updated');
    if(updatedEl) updatedEl.textContent = t.updated + ': --:--';
    if(typeof renderStations === 'function') renderStations();
  }
  document.getElementById('backBtn').addEventListener('click', function(){ window.parent && window.parent.postMessage('CLOSE_MODAL','*'); });
  (function(){
    var startY=0,curY=0,tracking=false;
    window.addEventListener('touchstart',function(e){ tracking=true; startY=e.touches[0].clientY; curY=startY; }, true);
    window.addEventListener('touchmove',function(e){ if(!tracking) return; curY=e.touches[0].clientY; }, true);
    window.addEventListener('touchend',function(){
      if(!tracking) return; tracking=false;
      var scrollTop=window.scrollY||document.documentElement.scrollTop;
      if(curY-startY>120&&scrollTop===0) window.parent && window.parent.postMessage('CLOSE_MODAL','*');
    });
  })();
  (function(){
    var touchStartX=null,touchStartY=null,isSwiping=false;
    window.addEventListener('touchstart',function(e){
      var t=e.touches[0];
      if(t.clientX<=40){ touchStartX=t.clientX; touchStartY=t.clientY; isSwiping=false; }
    },true);
    window.addEventListener('touchmove',function(e){
      if(touchStartX===null) return;
      var t=e.touches[0], deltaX=t.clientX-touchStartX, deltaY=Math.abs(t.clientY-touchStartY);
      if(deltaX>50&&deltaX>deltaY){
        e.preventDefault();
        e.stopPropagation();
        if(!isSwiping){ isSwiping=true; try{ window.parent.postMessage('CLOSE_MODAL','*'); }catch(err){} }
        touchStartX=null;
      }
    },{passive:false});
    window.addEventListener('touchend',function(){ touchStartX=null; touchStartY=null; isSwiping=false; },true);
  })();
  // Fallback demo data (used when ARSO is unreachable)
  var DEMO_STATIONS=[
    {group:'bovec',name:'Soča – Log Čezsoški',metrics:{level_cm:142,flow_m3s:28.5,temp_c:8.2,trend:'stable'},recent:[]},
    {group:'kobarid',name:'Soča – Kobarid',metrics:{level_cm:198,flow_m3s:52.3,temp_c:9.1,trend:'up'},recent:[]},
    {group:'tolmin',name:'Tolminka – Tolmin I',metrics:{level_cm:86,flow_m3s:12.1,temp_c:7.5,trend:'down'},recent:[]},
    {group:'koritnica',name:'Koritnica – Kal-Koritnica',metrics:{level_cm:52,flow_m3s:4.8,temp_c:6.3,trend:'stable'},recent:[]},
    {group:'zaga',name:'Učja – Žaga',metrics:{level_cm:68,flow_m3s:8.2,temp_c:7.8,trend:'up'},recent:[]}
  ];
  var DEMO_MUNICIPAL=[
    {name:'Občina Bovec',items:[{title:'Obvestilo: zapora ceste',date:'2026-02-05'}]},
    {name:'Občina Kobarid',items:[{title:'Razpis: štipendije',date:'2026-02-04'}]},
    {name:'Občina Tolmin',items:[{title:'Nova kolesarska steza',date:'2026-02-03'}]}
  ];

  // ARSO station name → group mapping
  var ARSO_GROUP_MAP=[
    {group:'bovec',    patterns:['Log Čezsoški','Čezsoška','Log Čez']},
    {group:'kobarid',  patterns:['Kobarid']},
    {group:'tolmin',   patterns:['Tolmin']},
    {group:'koritnica',patterns:['Koritnica','Kal-Koritnica']},
    {group:'zaga',     patterns:['Žaga','Zaga','Učja']}
  ];
  function arsoGroup(station){
    var name=(station.merilno_mesto||station.naziv||'').toLowerCase();
    var river=(station.reka||'').toLowerCase();
    for(var i=0;i<ARSO_GROUP_MAP.length;i++){
      var g=ARSO_GROUP_MAP[i];
      for(var j=0;j<g.patterns.length;j++){
        if(name.indexOf(g.patterns[j].toLowerCase())>=0||river.indexOf(g.patterns[j].toLowerCase())>=0) return g.group;
      }
    }
    return null;
  }

  var _liveData = null; // { updated_at, stations, municipal }

  async function fetchARSO(){
    var badge=document.getElementById('live-badge');
    var t=labelsByLang[getSelectedLang()]||labelsByLang.en;
    var updatedEl=document.getElementById('updated');
    function _setUpdated(ts){ if(updatedEl) updatedEl.textContent=t.updated+': '+new Date(ts).toLocaleString(); }
    function _setBadge(label,cls){ if(badge){badge.textContent=label;badge.className=cls;} }

    // Try Supabase cache first (max 4 hours)
    var sb=window.supabaseClient;
    if(sb){
      try{
        var { data: cache }=await sb.from('river_data_cache').select('*').maybeSingle();
        var isExpired=!cache||(new Date()-new Date(cache.updated_at))>(4*60*60*1000);
        if(!isExpired&&cache.data&&cache.data.stations&&cache.data.stations.length){
          _liveData=cache.data;
          _setBadge('CACHE','text-xs px-2 py-1 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-300');
          renderStations();
          _setUpdated(_liveData.updated_at);
          return;
        }
      }catch(e){ /* cache read failed, fall through to live fetch */ }
    }

    // Live ARSO fetch
    try{
      var r=await fetch('https://www.arso.gov.si/storitve/opendata/hidro.json');
      if(!r.ok) throw new Error('HTTP '+r.status);
      var json=await r.json();
      var postaje=(json.hidro&&json.hidro.postaja)||json.postaja||[];
      if(!Array.isArray(postaje)) postaje=[];
      var stations=[];
      postaje.forEach(function(p){
        var group=arsoGroup(p);
        if(!group) return;
        var lvl=parseFloat(p.vodostaj||p.ge_vodostaj||0);
        var flow=parseFloat(p.pretok||p.ge_pretok||0);
        var temp=parseFloat(p.temp_vode||p.ge_temp_vode||0);
        var name=(p.reka||'')+(p.merilno_mesto?' – '+p.merilno_mesto:'');
        stations.push({
          group:group,
          name:name,
          metrics:{level_cm:isNaN(lvl)?0:Math.round(lvl),flow_m3s:isNaN(flow)?0:Math.round(flow*10)/10,temp_c:isNaN(temp)?0:Math.round(temp*10)/10,trend:'stable'},
          recent:[]
        });
      });
      if(stations.length===0) throw new Error('no stations parsed');
      _liveData={updated_at:new Date().toISOString(),stations:stations,municipal:DEMO_MUNICIPAL};
      _setBadge('LIVE','text-xs px-2 py-1 rounded-full border border-emerald-500/40 bg-emerald-500/20 text-emerald-300');
      // Persist fresh data to cache
      if(sb){
        try{ await sb.from('river_data_cache').upsert({id:1,data:_liveData,updated_at:_liveData.updated_at}); }
        catch(e){ /* cache write failed, non-fatal */ }
      }
    }catch(e){
      _liveData={updated_at:new Date().toISOString(),stations:DEMO_STATIONS,municipal:DEMO_MUNICIPAL};
      _setBadge('OFFLINE','text-xs px-2 py-1 rounded-full border border-yellow-500/30 bg-yellow-500/10 text-yellow-300');
    }
    renderStations();
    _setUpdated(_liveData.updated_at);
  }

  var stationsEl=document.getElementById('stations');
  function trendIcon(t){return t==='up'?'↑':t==='down'?'↓':'→';}
  function trendColor(t){return t==='up'?'text-red-400':t==='down'?'text-emerald-300':'text-amber-300';}
  function renderStations(){
    var data=_liveData||{stations:DEMO_STATIONS};
    var t=labelsByLang[getSelectedLang()]||labelsByLang.en;
    var list=data.stations;
    if(!list||!list.length){stationsEl.innerHTML='<div class="text-sm text-gray-400 text-center py-8">…</div>';return;}
    stationsEl.innerHTML=list.map(function(s){
      var trendLabel=s.metrics.trend==='up'?t.trend_up:s.metrics.trend==='down'?t.trend_down:t.trend_stable;
      return '<div class="rounded-2xl border border-white/10 bg-white/5 p-4 mb-3"><div class="flex items-start justify-between gap-3"><div><div class="font-semibold">'+s.name+'</div></div><div class="px-2 py-1 rounded-lg border border-white/10 bg-black/20 flex items-center gap-2"><span class="'+trendColor(s.metrics.trend)+' font-bold text-lg">'+trendIcon(s.metrics.trend)+'</span><span class="text-xs text-gray-400">'+trendLabel+'</span></div></div><div class="grid grid-cols-3 gap-2 mt-3"><div class="rounded-xl bg-black/20 border border-white/10 p-3 text-center"><div class="text-2xl font-bold">'+s.metrics.level_cm+'</div><div class="text-xs text-gray-400">cm • '+t.level+'</div></div><div class="rounded-xl bg-black/20 border border-white/10 p-3 text-center"><div class="text-2xl font-bold text-cyan-300">'+s.metrics.flow_m3s+'</div><div class="text-xs text-gray-400">m³/s • '+t.flow+'</div></div><div class="rounded-xl bg-black/20 border border-white/10 p-3 text-center"><div class="text-2xl font-bold text-amber-300">'+s.metrics.temp_c+'</div><div class="text-xs text-gray-400">°C • '+t.temp+'</div></div></div></div>';
    }).join('');
  }
  applyLang();
  // Show loading state, then fetch ARSO
  stationsEl.innerHTML='<div class="text-sm text-gray-400 text-center py-8">Nalaganje…</div>';
  fetchARSO();
  window.addEventListener('storage',function(e){if(e.key==='preferredLanguage'){applyLang();}});
</script>
</body>
</html>
