<!doctype html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Izgubljeno / Nađeno</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/supabase-client.js?v=20260228-2"></script>
</head>
<body class="min-h-screen bg-[#0b0f14] text-gray-100">
  <div class="sticky top-0 z-50 border-b border-white/10 bg-black/30 backdrop-blur">
    <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
      <button id="backBtn" class="px-3 py-2 rounded-xl border border-white/15 bg-white/5"></button>
      <div class="font-semibold" id="pageTitle">Izgubljeno / Nađeno</div>
      <div></div>
    </div>
  </div>

  <main class="max-w-xl mx-auto px-4 py-6 space-y-4">
    <div class="rounded-2xl border border-white/10 bg-white/5 p-4 text-sm text-gray-300" id="introText"></div>

    <div class="rounded-2xl border border-white/10 bg-white/5 p-4 space-y-3">
      <label class="block text-sm text-gray-300" id="labelEmail">Tvoj email</label>
      <input id="email" type="email" class="w-full rounded-xl bg-black/30 border border-white/10 p-3" />

      <label class="block text-sm text-gray-300" id="labelMsg">Poruka (max 500)</label>
      <textarea id="msg" maxlength="500" rows="5" class="w-full rounded-xl bg-black/30 border border-white/10 p-3"></textarea>

      <button id="save" class="w-full py-3 rounded-xl bg-emerald-500/20 border border-emerald-500/30 text-emerald-200 font-semibold"></button>

      <div id="limit" class="hidden text-xs text-red-300"></div>
    </div>

    <section class="space-y-3">
      <h2 class="text-lg font-semibold" id="sectionTitle">Poruke (poslednjih 30 dana)</h2>
      <div id="list" class="space-y-3"></div>
    </section>
  </main>

<script>
  var SUPPORTED_LANGS = ['sl','en','de','pl','cs','it'];
  function getSelectedLang(){
    var raw = (localStorage.getItem('preferredLanguage') || localStorage.getItem('lang') || 'en').toLowerCase();
    return SUPPORTED_LANGS.indexOf(raw) >= 0 ? raw : 'en';
  }
  var labelsByLang = {
    sl: { back:'← Nazaj', title:'Izgubljeno / Najdeno', intro:'Vnesi svojo e-pošto in sporočilo (max 500 znakov). Sprejemamo največ 3 objave na e-pošto v 10 dneh. Sporočila, starejša od 10 dni, se brišejo samodejno. Prikazana so sporočila iz vseh apartmajev.', yourEmail:'Tvoj email', messageMax:'Sporočilo (max 500)', placeholderMsg:'Npr. Izgubil sem modro jakno v bližini...', publish:'Objavi / Shrani', limitReached:'Dosežena omejitev (max 3 objave na e-pošto v 10 dneh).', messagesTitle:'Sporočila (zadnjih 10 dni — vsi apartmaji)', noMessages:'Ni sporočil.' },
    en: { back:'← Back', title:'Lost & Found', intro:'No login required: enter your email and message (max 500 characters). Max 3 posts per email in 10 days. Messages older than 10 days are deleted automatically. Posts from all apartments are shown.', yourEmail:'Your email', messageMax:'Message (max 500)', placeholderMsg:'E.g. I lost a blue jacket near...', publish:'Publish / Save', limitReached:'Limit reached (max 3 posts per email in 10 days).', messagesTitle:'Messages (last 10 days — all apartments)', noMessages:'No messages.' },
    de: { back:'← Zurück', title:'Verloren / Gefunden', intro:'Ohne Anmeldung: E-Mail und Nachricht eingeben (max 500 Zeichen). Max 3 Beiträge pro E-Mail in 10 Tagen. Nachrichten älter als 10 Tage werden automatisch gelöscht. Beiträge aller Apartments werden angezeigt.', yourEmail:'Deine E-Mail', messageMax:'Nachricht (max 500)', placeholderMsg:'Z.B. Ich habe eine blaue Jacke verloren bei...', publish:'Veröffentlichen / Speichern', limitReached:'Limit erreicht (max 3 Beiträge pro E-Mail in 10 Tagen).', messagesTitle:'Nachrichten (letzte 10 Tage — alle Apartments)', noMessages:'Keine Nachrichten.' },
    pl: { back:'← Wstecz', title:'Zgubione / Znalezione', intro:'Bez logowania: wpisz e-mail i wiadomość (max 500 znaków). Max 3 posty na e-mail w 10 dniach. Wiadomości starsze niż 10 dni są usuwane. Posty ze wszystkich apartamentów są widoczne.', yourEmail:'Twój e-mail', messageMax:'Wiadomość (max 500)', placeholderMsg:'Np. Zgubiłem niebieską kurtkę w okolicy...', publish:'Opublikuj / Zapisz', limitReached:'Osiągnięto limit (max 3 posty na e-mail w 10 dniach).', messagesTitle:'Wiadomości (ostatnie 10 dni — wszystkie apartamenty)', noMessages:'Brak wiadomości.' },
    cs: { back:'← Zpět', title:'Ztraceno / Nalezeno', intro:'Bez přihlášení: zadejte e-mail a zprávu (max 500 znaků). Max 3 příspěvky na e-mail za 10 dní. Zprávy starší než 10 dní se automaticky smažou. Zobrazeny jsou příspěvky ze všech apartmánů.', yourEmail:'Váš e-mail', messageMax:'Zpráva (max 500)', placeholderMsg:'Např. Ztratil jsem modrou bundu u...', publish:'Publikovat / Uložit', limitReached:'Dosažen limit (max 3 příspěvky na e-mail za 10 dní).', messagesTitle:'Zprávy (posledních 10 dní — všechny apartmány)', noMessages:'Žádné zprávy.' },
    it: { back:'← Indietro', title:'Perso / Trovato', intro:'Senza accesso: inserisci email e messaggio (max 500 caratteri). Max 3 post per email in 10 giorni. Messaggi più vecchi di 10 giorni vengono cancellati. I post di tutti gli appartamenti sono visibili.', yourEmail:'La tua email', messageMax:'Messaggio (max 500)', placeholderMsg:'Es. Ho perso una giacca blu vicino a...', publish:'Pubblica / Salva', limitReached:'Limite raggiunto (max 3 post per email in 10 giorni).', messagesTitle:'Messaggi (ultimi 10 giorni — tutti gli appartamenti)', noMessages:'Nessun messaggio.' }
  };
  function applyLang(){
    var t = labelsByLang[getSelectedLang()] || labelsByLang.en;
    document.getElementById('backBtn').textContent = t.back;
    document.getElementById('pageTitle').textContent = t.title;
    document.getElementById('introText').textContent = t.intro;
    document.getElementById('labelEmail').textContent = t.yourEmail;
    document.getElementById('labelMsg').textContent = t.messageMax;
    document.getElementById('msg').placeholder = t.placeholderMsg;
    document.getElementById('save').textContent = t.publish;
    document.getElementById('limit').textContent = t.limitReached;
    document.getElementById('sectionTitle').textContent = t.messagesTitle;
    if(typeof render === 'function') render();
  }
  document.getElementById('backBtn').addEventListener('click', () => { window.parent?.postMessage("CLOSE_MODAL", "*"); });
  (function(){
    var touchStartX=null,touchStartY=null,isSwiping=false;
    window.addEventListener('touchstart',function(e){
      var t=e.touches[0];
      if(t.clientX<=40){ touchStartX=t.clientX; touchStartY=t.clientY; isSwiping=false; }
    },true);
    window.addEventListener('touchmove',function(e){
      if(touchStartX===null) return;
      var t=e.touches[0], deltaX=t.clientX-touchStartX, deltaY=Math.abs(t.clientY-touchStartY);
      if(deltaX>50&&deltaX>deltaY){
        e.preventDefault();
        e.stopPropagation();
        if(!isSwiping){ isSwiping=true; try{ window.parent.postMessage('CLOSE_MODAL','*'); }catch(err){} }
        touchStartX=null;
      }
    },{passive:false});
    window.addEventListener('touchend',function(){ touchStartX=null; touchStartY=null; isSwiping=false; },true);
  })();
  applyLang();
  window.addEventListener('storage', function(e){ if(e.key==='preferredLanguage'){ applyLang(); } });

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, function(m) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];
    });
  }

  // Wait for supabaseClient to be initialized (it loads its SDK asynchronously)
  function waitForSB(cb, maxMs) {
    if (window.supabaseClient) { cb(window.supabaseClient); return; }
    var waited = 0, step = 100;
    var timer = setInterval(function() {
      if (window.supabaseClient) { clearInterval(timer); cb(window.supabaseClient); return; }
      waited += step;
      if (waited >= (maxMs || 8000)) { clearInterval(timer); cb(null); }
    }, step);
  }

  function render(sb) {
    var t    = labelsByLang[getSelectedLang()] || labelsByLang.en;
    var list = document.getElementById('list');
    if (!list) return;
    var client = sb || window.supabaseClient;
    if (!client) {
      list.innerHTML = '<div class="text-sm text-gray-400">' + t.noMessages + '</div>';
      return;
    }
    list.innerHTML = '<div class="text-sm text-gray-400">\u2026</div>';
    // Global view — pass null to get ALL apartments' posts
    console.log('[LostFound] list fetch start global');
    client
      .rpc('get_lost_found_posts_public', { p_tenant_slug: null, p_limit: 50 })
      .then(function(r) {
        console.log('[LostFound] list fetch end', { ok: !r.error, count: (r.data || []).length });
        var items = (!r.error && r.data) ? r.data : [];
        if (!items.length) {
          list.innerHTML = '<div class="text-sm text-gray-400">' + t.noMessages + '</div>';
          return;
        }
        list.innerHTML = items.map(function(x) {
          var source = x.tenant_slug ? '<span class="text-emerald-400/70">@' + escapeHtml(x.tenant_slug) + '</span>' : '';
          return '<div class="rounded-2xl border border-white/10 bg-white/5 p-4">' +
            '<div class="flex items-center justify-between gap-2 flex-wrap">' +
            source +
            '<div class="text-xs text-gray-400 ml-auto">' + new Date(x.created_at).toLocaleString() + '</div>' +
            '</div>' +
            '<div class="mt-2 text-sm">' + escapeHtml(x.message) + '</div>' +
            '</div>';
        }).join('');
      })
      .catch(function(err) {
        console.error('[LostFound] list fetch error', err && err.message ? err.message : err);
        list.innerHTML = '<div class="text-sm text-gray-400">' + t.noMessages + '</div>';
      });
  }

  function _withTimeout(promise, ms, label) {
    return new Promise(function(resolve, reject) {
      var done = false;
      var timer = setTimeout(function() {
        if (done) return;
        done = true;
        reject(new Error(label || 'TIMEOUT'));
      }, ms);
      promise.then(function(v) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        resolve(v);
      }).catch(function(err) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        reject(err);
      });
    });
  }

  document.getElementById('save').addEventListener('click', function() {
    var email   = (document.getElementById('email').value || '').trim().toLowerCase();
    var msg     = (document.getElementById('msg').value   || '').trim();
    var limitEl = document.getElementById('limit');
    if (!email || !msg) return;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) || email.length > 120) {
      limitEl.classList.remove('hidden'); return;
    }
    var slug    = new URLSearchParams(window.location.search).get('t') || null;
    var saveBtn = document.getElementById('save');
    saveBtn.disabled = true;
    var _origBtnTxt = saveBtn.textContent;
    saveBtn.textContent = 'Pošiljam…';
    waitForSB(function(client) {
      if (!client) {
        saveBtn.disabled = false;
        saveBtn.textContent = _origBtnTxt;
        limitEl.textContent = '❌ Supabase nije dostupan. Pokušaj ponovo.';
        limitEl.classList.remove('hidden');
        return;
      }
      console.log('[LostFound] insert start', { tenant_slug: slug || null, email_masked: email.replace(/(^.{2}).*(@.*$)/, '$1***$2') });
      _withTimeout(
        client.rpc('create_lost_found_post_v1', { p_email: email, p_message: msg, p_tenant_slug: slug }),
        10000,
        'LOST_FOUND_SUBMIT_TIMEOUT'
      )
        .then(function(r) {
          console.log('[LostFound] insert end', { ok: !r.error, tenant_slug: slug || null });
          if (r.error) {
            var errMsg = r.error.message || '';
            if (errMsg.indexOf('LIMIT_REACHED') >= 0 || errMsg.indexOf('Limit') >= 0) {
              var _tl = labelsByLang[getSelectedLang()] || labelsByLang.en;
              limitEl.textContent = _tl.limitReached;
            } else {
              limitEl.textContent = '❌ ' + (errMsg || 'Napaka. Poskusi znova.');
            }
            limitEl.classList.remove('hidden');
            return;
          }
          limitEl.classList.add('hidden');
          document.getElementById('msg').value = '';
          var _ts = labelsByLang[getSelectedLang()] || labelsByLang.en;
          saveBtn.textContent = '✓ Sačuvano.';
          setTimeout(function() { saveBtn.textContent = _ts.publish; }, 2500);
          render(client);
        })
        .catch(function(err) {
          console.error('[LostFound] insert error', err && err.message ? err.message : err);
          limitEl.textContent = '❌ Greška pri slanju. Pokušaj ponovo.';
          limitEl.classList.remove('hidden');
        })
        .finally(function() {
          saveBtn.disabled = false;
          if (saveBtn.textContent === 'Pošiljam…') saveBtn.textContent = _origBtnTxt;
        });
    }, 6000);
  });

  // Initial load — wait for Supabase then render
  waitForSB(function(client) {
    if (client) {
      client.rpc('cleanup_lost_found_posts').catch(function(){});
    }
    render(client);
  }, 6000);
</script>
<div id="footer-legal" style="text-align:center;padding:0.75rem 1rem 1.5rem;font-size:0.72rem;color:#a0b0a8;display:flex;flex-wrap:wrap;justify-content:center;gap:0.3rem 0.9rem"></div>
<script>
(function(){
  var el=document.getElementById('footer-legal');if(!el)return;
  var lang=(localStorage.getItem('preferredLanguage')||'sl').toLowerCase().split('-')[0];
  if(lang!=='sl'&&lang!=='en')lang='sl';
  var fb={copyright:{sl:'© 2026 Soča Guide',en:'© 2026 Soča Guide'},links:[
    {label:{sl:'Impressum',en:'Imprint'},url:'../legal/?doc=impressum',enabled:true},
    {label:{sl:'Zasebnost',en:'Privacy'},url:'../legal/?doc=privacy',enabled:true},
    {label:{sl:'Piškotki',en:'Cookies'},url:'../legal/?doc=cookies',enabled:true},
    {label:{sl:'Pogoji',en:'Terms'},url:'../legal/?doc=terms',enabled:true}
  ]};
  function render(cfg){
    var links=(cfg.links||[]).filter(function(l){return l.enabled;});
    if(!links.length)return;
    var copy=cfg.copyright&&(cfg.copyright[lang]||cfg.copyright.sl);
    var h=copy?'<span>'+copy+'</span>':'';
    links.forEach(function(l){var lbl=l.label&&(l.label[lang]||l.label.sl);h+='<a href="'+l.url+'" style="color:inherit;text-decoration:none;opacity:0.7">'+lbl+'</a>';});
    el.innerHTML=h;
  }
  render(fb);
  var _w=0;function tryLoad(){var sb=window.supabaseClient||window.SB;if(!sb){_w+=200;if(_w<8000)setTimeout(tryLoad,200);return;}
    sb.from('items').select('data_json').eq('section_key','ui').eq('item_key','footer_config').is('tenant_id',null).maybeSingle()
    .then(function(r){if(r&&r.data&&r.data.data_json){var cfg=JSON.parse(JSON.stringify(r.data.data_json));
      if(cfg.links)cfg.links=cfg.links.map(function(l){var u=(l.url||'').replace(/^(\.\/|\/)/,'../');if(!u.startsWith('../'))u='../'+u;return Object.assign({},l,{url:u});});
      render(cfg);}}).catch(function(){});}tryLoad();
})();
</script>
</body>
</html>
