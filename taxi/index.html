<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Taxi & Bus</title>
  <link rel="stylesheet" href="../assets/directory.css?v=20260219-1">
  <link rel="stylesheet" href="../assets/theme-soca.css">
</head>
<body class="theme-soca">
  <header class="dir-header">
    <button id="dir-back" class="dir-back" type="button" aria-label="Nazaj">←</button>
    <div class="dir-title-text" id="dir-title">Taxi & Bus</div>
  </header>

  <div class="dir-chips-wrap">
    <div id="dir-chips"></div>
  </div>

  <main class="dir-body">
    <div id="dir-loading">⏳</div>
    <div id="dir-empty"></div>

    <!-- Premium section -->
    <section style="display:contents">
      <div id="dir-hdr-premium" class="dir-sec-hdr"></div>
      <div class="dir-premium-wrap" id="dir-sec-premium"></div>
    </section>

    <!-- Featured section -->
    <section style="display:contents">
      <div id="dir-hdr-featured" class="dir-sec-hdr"></div>
      <div class="dir-featured-scroll" id="dir-sec-featured"></div>
    </section>

    <!-- Standard section -->
    <section style="display:contents">
      <div id="dir-hdr-standard" class="dir-sec-hdr"></div>
      <div class="dir-standard-wrap" id="dir-sec-standard"></div>
    </section>
  </main>

  <script src="../assets/supabase-client.js?v=20260219-1"></script>
  <script>
    window._DIR_TYPE = 'taxi';
    window._DIR_TIER_LABELS = {
      premium:  { sl:'⭐ Priporočamo',  en:'⭐ Recommended',   de:'⭐ Empfohlen',    it:'⭐ Consigliato',  pl:'⭐ Polecane',      cs:'⭐ Doporučujeme' },
      featured: { sl:'🔥 Popularno',    en:'🔥 Popular',       de:'🔥 Beliebt',      it:'🔥 Popolare',     pl:'🔥 Popularne',     cs:'🔥 Oblíbené' },
      standard: { sl:'📍 Vsi prevozniki',en:'📍 All providers',de:'📍 Alle Anbieter',it:'📍 Tutti',        pl:'📍 Wszyscy',       cs:'📍 Všichni' }
    };
    try { if (window.parent && window.parent._appMunicipality) window._appMunicipality = window.parent._appMunicipality; } catch(e){}
  </script>
  <script src="../assets/directory.js?v=20260227-2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var lang = (localStorage.getItem('preferredLanguage') || 'sl').toLowerCase();
      var tl = window._DIR_TIER_LABELS;
      ['premium','featured','standard'].forEach(function(tier) {
        var el = document.getElementById('dir-hdr-' + tier);
        if (el && tl[tier]) el.textContent = tl[tier][lang] || tl[tier].en;
      });
      var emptyEl = document.getElementById('dir-empty');
      var ui = { sl:'Ni rezultatov.', en:'No results.', de:'Keine Ergebnisse.', it:'Nessun risultato.', pl:'Brak wyników.', cs:'Žádné výsledky.' };
      if (emptyEl) emptyEl.textContent = ui[lang] || ui.en;
    });
  </script>
  <div id="footer-legal" style="text-align:center;padding:0.75rem 1rem 1.5rem;font-size:0.72rem;color:#a0b0a8;display:flex;flex-wrap:wrap;justify-content:center;gap:0.3rem 0.9rem"></div>
  <script>
  (function(){
    var el=document.getElementById('footer-legal'); if(!el)return;
    var lang=(localStorage.getItem('preferredLanguage')||'sl').toLowerCase().split('-')[0];
    if(lang!=='sl'&&lang!=='en')lang='sl';
    var fb={copyright:{sl:'© 2026 Soča Guide',en:'© 2026 Soča Guide'},links:[
      {label:{sl:'Impressum',en:'Imprint'},url:'../legal/?doc=impressum',enabled:true},
      {label:{sl:'Zasebnost',en:'Privacy'},url:'../legal/?doc=privacy',enabled:true},
      {label:{sl:'Piškotki',en:'Cookies'},url:'../legal/?doc=cookies',enabled:true},
      {label:{sl:'Pogoji',en:'Terms'},url:'../legal/?doc=terms',enabled:true}
    ]};
    function render(cfg){
      var links=(cfg.links||[]).filter(function(l){return l.enabled;});if(!links.length)return;
      var copy=cfg.copyright&&(cfg.copyright[lang]||cfg.copyright.sl);
      var h=copy?'<span>'+copy+'</span>':'';
      links.forEach(function(l){var lbl=l.label&&(l.label[lang]||l.label.sl);h+='<a href="'+l.url+'" style="color:inherit;text-decoration:none;opacity:0.7">'+lbl+'</a>';});
      el.innerHTML=h;
    }
    render(fb);
    var _w=0;function tryLoad(){var sb=window.supabaseClient||window.SB;if(!sb){_w+=200;if(_w<8000)setTimeout(tryLoad,200);return;}
      sb.from('items').select('data_json').eq('section_key','ui').eq('item_key','footer_config').is('tenant_id',null).maybeSingle()
      .then(function(r){if(r&&r.data&&r.data.data_json){var cfg=JSON.parse(JSON.stringify(r.data.data_json));
        if(cfg.links)cfg.links=cfg.links.map(function(l){var u=(l.url||'').replace(/^(\.\/|\/)/,'../');if(!u.startsWith('../'))u='../'+u;return Object.assign({},l,{url:u});});
        render(cfg);}}).catch(function(){});}tryLoad();
  })();
  </script>
</body>
</html>
